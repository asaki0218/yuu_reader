<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡閱讀器 - 完美微調版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; --text-color: #333333; --glass-bg: rgba(255, 255, 255, 0.7); --border-color: rgba(0, 0, 0, 0.1); }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; transition: background 0.3s, color 0.3s; overflow: hidden; }
        
        /* 頂部導航 */
        #header-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: var(--glass-bg); border-bottom: 1px solid var(--border-color); z-index: 3000; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        
        #debug-log { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 10px 20px; background: rgba(0,0,0,0.7); color: #fff; font-size: 13px; border-radius: 20px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.4s; }
        #debug-log.show { opacity: 1; }
        
        .top-btn { background: transparent; border: 1px solid var(--border-color); padding: 5px 12px; border-radius: 6px; font-size: 13px; color: inherit; cursor: pointer; }

        /* 設定面板 */
        #settings-panel { display: none; position: fixed; top: 55px; right: 15px; width: 260px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 4500; padding: 18px; color: var(--text-color); }
        .setting-section { margin-bottom: 18px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-label { font-size: 12px; font-weight: bold; opacity: 0.8; }
        .reset-icon { cursor: pointer; font-size: 16px; opacity: 0.4; padding: 2px 8px; }
        .theme-options { display: flex; gap: 8px; flex-wrap: wrap; }
        .theme-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); cursor: pointer; }
        .ctrl-group { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 10px; }
        .ctrl-btn { background: transparent; border: none; width: 40px; height: 35px; font-size: 18px; cursor: pointer; color: inherit; }
        .ctrl-val { font-size: 13px; font-weight: 600; min-width: 45px; text-align: center; }

        /* 閱讀區域 */
        #main-scroll-area { flex: 1; margin-top: 50px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #viewer { width: 100%; max-width: 800px; margin: 0 auto; padding: 5px 15px; box-sizing: border-box; }
        
        /* 導航按鈕 */
        .nav-controls { display: flex; justify-content: center; gap: 8px; padding: 30px 15px 120px; max-width: 500px; margin: 0 auto; }
        .btn-base { border: 1px solid var(--border-color); border-radius: 12px; font-size: 13px; padding: 14px 5px; cursor: pointer; color: inherit; background: var(--glass-bg); backdrop-filter: blur(10px); }

        /* 目錄介面調整 */
        #toc { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 70%; /* 修改：佔比改為約一半 */
            height: 100%; background: var(--bg-color); z-index: 5000; overflow-y: auto; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .toc-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: var(--bg-color); z-index: 10; }
        .toc-item { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 12px; cursor: pointer; }
        
        /* 檔名顯示調整 */
        .book-filename { 
            font-size: 12px; opacity: 0.5; display: block; margin-top: 6px; 
            word-break: break-all; /* 修改：強制長單字換行 */
            white-space: normal;  /* 修改：允許自動換行 */
            line-height: 1.4;
        }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4000; }
        #drop-zone { height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <div id="debug-log"></div>
    <div id="header-fixed"><button class="top-btn" onclick="openTOC()">📖 目錄</button><button class="top-btn" onclick="toggleSettings()">⚙️ 設定</button></div>
    
    <div id="settings-panel">
        <div class="setting-section">
            <div class="label-row"><div class="setting-label">主題配色</div></div>
            <div class="theme-options">
                <div class="theme-dot" style="background: #ffffff;" onclick="changeTheme('white')"></div>
                <div class="theme-dot" style="background: #f4ecd8;" onclick="changeTheme('sepia')"></div>
                <div class="theme-dot" style="background: #e0e0e0;" onclick="changeTheme('gray')"></div>
                <div class="theme-dot" style="background: #1a2f23;" onclick="changeTheme('green')"></div>
                <div class="theme-dot" style="background: #1c1c1e;" onclick="changeTheme('dark')"></div>
            </div>
        </div>
        <div class="setting-section"><div class="label-row"><div class="setting-label">文字大小</div><span class="reset-icon" onclick="resetConfig('fs')">↺</span></div><div class="ctrl-group"><button class="ctrl-btn" onclick="changeFontSize(-1)">−</button><span class="ctrl-val" id="val-font">19px</span><button class="ctrl-btn" onclick="changeFontSize(1)">+</button></div></div>
        <div class="setting-section"><div class="label-row"><div class="setting-label">行高</div><span class="reset-icon" onclick="resetConfig('lh')">↺</span></div><div class="ctrl-group"><button class="ctrl-btn" onclick="changeLineHeight(-0.1)">−</button><span class="ctrl-val" id="val-line">1.8</span><button class="ctrl-btn" onclick="changeLineHeight(0.1)">+</button></div></div>
        <div class="setting-section"><div class="label-row"><div class="setting-label">段落間距</div><span class="reset-icon" onclick="resetConfig('ps')">↺</span></div><div class="ctrl-group"><button class="ctrl-btn" onclick="changeParaSpacing(-2)">−</button><span class="ctrl-val" id="val-para">15px</span><button class="ctrl-btn" onclick="changeParaSpacing(2)">+</button></div></div>
    </div>
    
    <div id="main-scroll-area">
        <div id="overlay" onclick="closeAll()"></div>
        <div id="toc">
            <div class="toc-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold; font-size: 15px;">書籍目錄</span>
                    <span onclick="closeAll()" style="color: #007aff; font-size: 14px; font-weight: bold; cursor: pointer;">關閉</span>
                </div>
                <span id="display-filename" class="book-filename">尚未選取檔案</span>
            </div>
            <div id="toc-list"></div>
        </div>

        <div id="drop-zone"><h3>極簡閱讀器</h3><input type="file" id="file-input" accept=".epub"></div>
        <div id="viewer"></div>
        
        <div id="nav-area" class="nav-controls" style="display:none;">
            <button class="btn-base" style="flex:1" onclick="if(rendition) rendition.prev()">上一頁</button>
            <button class="btn-base" style="flex:1" onclick="if(rendition) rendition.display(0)">封面</button>
            <button class="btn-base" style="flex:1.2; font-weight:bold" onclick="if(rendition) rendition.next()">下一頁</button>
        </div>
    </div>

    <script>
        let book, rendition, fileName = "";
        const DEFAULTS = { fs: 19, lh: 1.8, ps: 15, tm: 'white' };
        let config = { 
            fontSize: parseInt(localStorage.getItem("r_fs")) || DEFAULTS.fs, 
            lineHeight: parseFloat(localStorage.getItem("r_lh")) || DEFAULTS.lh, 
            paraSpacing: parseInt(localStorage.getItem("r_ps")) || DEFAULTS.ps, 
            theme: localStorage.getItem("r_tm") || DEFAULTS.tm 
        };

        const setMsg = (m) => {
            const el = document.getElementById('debug-log');
            el.innerText = m; el.classList.add('show');
            setTimeout(() => { el.classList.remove('show'); }, 2000);
        };

        document.getElementById('file-input').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileName = file.name;
            document.getElementById('display-filename').innerText = fileName;
            setMsg("加載中...");

            if (book) book.destroy();
            book = ePub();
            
            try {
                const buffer = await file.arrayBuffer();
                await book.open(buffer);
                rendition = book.renderTo("viewer", { width: "100%", height: "auto", flow: "scrolled" });
                
                document.getElementById('drop-zone').style.display = 'none';
                document.getElementById('nav-area').style.display = 'flex';
                
                const savedPos = localStorage.getItem("pos_" + fileName);
                await rendition.display(savedPos || 0);
                
                applyAllStyles();

                book.loaded.navigation.then(nav => {
                    const list = document.getElementById('toc-list');
                    list.innerHTML = "";
                    nav.forEach(ch => {
                        const d = document.createElement('div');
                        d.className = "toc-item"; d.innerText = ch.label.trim();
                        d.onclick = () => { rendition.display(ch.href); closeAll(); };
                        list.appendChild(d);
                    });
                });

                rendition.on("relocated", loc => { if (loc && loc.start) localStorage.setItem("pos_" + fileName, loc.start.cfi); });
                rendition.on("rendered", () => { document.getElementById('main-scroll-area').scrollTo(0, 0); });
            } catch (err) { setMsg("載入失敗"); }
        };

        function applyEbookStyles() {
            if (!rendition) return;
            const color = getComputedStyle(document.documentElement).getPropertyValue('--text-color');
            rendition.getContents().forEach(c => {
                c.addStylesheetRules({
                    "body": { "color": color + " !important", "font-size": config.fontSize + "px !important", "line-height": config.lineHeight + " !important", "background": "transparent !important" },
                    "p": { "margin-bottom": config.paraSpacing + "px !important", "margin-top": "0 !important" }
                });
            });
        }

        function applyAllStyles() {
            updateUITheme();
            document.getElementById('val-font').innerText = config.fontSize + "px";
            document.getElementById('val-line').innerText = config.lineHeight;
            document.getElementById('val-para').innerText = config.paraSpacing + "px";
            if (rendition) {
                applyEbookStyles();
                rendition.hooks.content.register(contents => { applyEbookStyles(); return Promise.resolve(); });
            }
        }

        function updateConfig(key, val, elId, unit) {
            localStorage.setItem(key, val);
            document.getElementById(elId).innerText = val + unit;
            applyEbookStyles();
        }

        function changeFontSize(d) { config.fontSize = Math.max(12, Math.min(40, config.fontSize + d)); updateConfig("r_fs", config.fontSize, "val-font", "px"); }
        function changeLineHeight(d) { config.lineHeight = Math.round((Math.max(1.2, Math.min(3.0, config.lineHeight + d))) * 10) / 10; updateConfig("r_lh", config.lineHeight, "val-line", ""); }
        function changeParaSpacing(d) { config.paraSpacing = Math.max(15, Math.min(45, config.paraSpacing + d)); updateConfig("r_ps", config.paraSpacing, "val-para", "px"); }
        
        function resetConfig(type) {
            if (type === 'fs') { config.fontSize = DEFAULTS.fs; updateConfig("r_fs", config.fontSize, "val-font", "px"); }
            if (type === 'lh') { config.lineHeight = DEFAULTS.lh; updateConfig("r_lh", config.lineHeight, "val-line", ""); }
            if (type === 'ps') { config.paraSpacing = DEFAULTS.ps; updateConfig("r_ps", config.paraSpacing, "val-para", "px"); }
        }

        function changeTheme(type) { config.theme = type; localStorage.setItem("r_tm", type); updateUITheme(); applyEbookStyles(); closeAll(); }
        
        function updateUITheme() {
            const t = config.theme;
            if (t === 'dark') setThemeVars('#1c1c1e', '#cccccc', 'rgba(44, 44, 46, 0.8)', 'rgba(255,255,255,0.1)');
            else if (t === 'sepia') setThemeVars('#f4ecd8', '#5b4636', 'rgba(244, 236, 216, 0.8)', 'rgba(0,0,0,0.05)');
            else if (t === 'gray') setThemeVars('#e0e0e0', '#222222', 'rgba(224, 224, 224, 0.8)', 'rgba(0,0,0,0.1)');
            else if (t === 'green') setThemeVars('#1a2f23', '#e0eade', 'rgba(26, 47, 35, 0.8)', 'rgba(255,255,255,0.1)');
            else setThemeVars('#ffffff', '#333333', 'rgba(255,255,255,0.7)', 'rgba(0,0,0,0.1)');
        }

        function setThemeVars(bg, text, glass, border) {
            const root = document.documentElement;
            root.style.setProperty('--bg-color', bg); root.style.setProperty('--text-color', text);
            root.style.setProperty('--glass-bg', glass); root.style.setProperty('--border-color', border);
        }

        function toggleSettings() { const p = document.getElementById('settings-panel'); const isShow = p.style.display === 'block'; closeAll(); if (!isShow) { p.style.display = 'block'; document.getElementById('overlay').style.display = 'block'; } }
        function openTOC() { closeAll(); document.getElementById('toc').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { document.getElementById('toc').style.display = 'none'; document.getElementById('settings-panel').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
